# Slack App Manifest for DAWN
# Import this at https://api.slack.com/apps → Create New App → From Manifest
#
# After creating the app:
# 1. Go to "Socket Mode" → Enable
# 2. Go to "OAuth & Permissions" → Install to Workspace
# 3. Copy Bot Token (xoxb-...) → set as SLACK_BOT_TOKEN
# 4. Go to "Basic Information" → App-Level Tokens → Generate
#    Token name: "dawn-socket" → Scope: "connections:write"
#    Copy token (xapp-...) → set as SLACK_APP_TOKEN
# 5. Go to "Basic Information" → Signing Secret → copy → set as SLACK_SIGNING_SECRET

display_information:
  name: DAWN
  description: "Digital AI Working Network — Regent's AI operations manager"
  background_color: "#1a1a2e"
  long_description: |-
    DAWN is Regent's AI assistant and operations manager.
    
    She can:
    • Answer questions about Regent, your projects, and systems
    • Run payroll through Axis ERP
    • Generate invoices and track revenue
    • Monitor system health
    • Manage CRM and client data
    • Execute deployments via Jarvis
    • Track leads, pipeline, and campaigns
    • Manage team and projects
    
    Built by Solomon John for Regent (Kampala, Uganda).

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: DAWN
    always_online: true
  slash_commands:
    - command: /dawn
      description: "Ask DAWN anything"
      usage_hint: "[your question]"
      should_escape: false
    - command: /status
      description: "Check system health"
      usage_hint: ""
      should_escape: false
    - command: /revenue
      description: "Revenue summary"
      usage_hint: ""
      should_escape: false
    - command: /leads
      description: "CRM lead management and pipeline"
      usage_hint: "[status] [--source X] [--limit N]"
      should_escape: false
    - command: /pipeline
      description: "Pipeline funnel summary"
      usage_hint: ""
      should_escape: false
    - command: /team
      description: "Team roster management"
      usage_hint: "[add <name> <role>]"
      should_escape: false
    - command: /projects
      description: "Project management"
      usage_hint: "[all|add <name>]"
      should_escape: false
    - command: /dashboard
      description: "Full team dashboard overview"
      usage_hint: ""
      should_escape: false
    - command: /payroll
      description: "Run payroll for a client (Phase 2)"
      usage_hint: "[company name] [month]"
      should_escape: false
    - command: /invoice
      description: "Generate an invoice (Phase 2)"
      usage_hint: "[client] [amount] [description]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - users:read
      - team:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
