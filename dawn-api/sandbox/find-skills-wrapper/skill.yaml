name: find-skills
description: >
  Helps users discover and install agent skills when they ask questions like
  "how do I do X", "find a skill for X", "is there a skill that can...",
  or express interest in extending capabilities. Searches skills.sh leaderboard
  and runs `npx skills find` to discover relevant skills, verifies quality
  (install count, source reputation, GitHub stars), and presents options.
version: "1.0.0"
allowed-tools:
  - web_search
  - filesystem__read
  - filesystem__write
  - git__clone
denied-tools: []
tags:
  - skills
  - discovery
  - ecosystem
  - vercel
